<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Questionnaire 💘</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>💖 The Lair's Matching Simulator 💖</h1>
</header>

<div class="container">

    <div class="question-card">

        <p class="question-number">Question n°1</p>

        <p class="question-text">
            Mon partenaire est la personne la plus importante du monde
        </p>

        <div class="scale">
            <span class="label">Pas du tout d'accord</span>

            <div class="circles">
                <div class="circle small" onclick="select(this, 1)"></div>
                <div class="circle medium" onclick="select(this, 2)"></div>
                <div class="circle large" onclick="select(this, 3)"></div>
                <div class="circle medium" onclick="select(this, 4)"></div>
                <div class="circle small" onclick="select(this, 5)"></div>
            </div>

            <span class="label">Absolument d'accord</span>
        </div>

        <button class="validate-btn" onclick="validate()">Valider 💕</button>

    </div>

</div>

<script>
var charsPool1 = {
    1: 'Valentin',
    2: 'Alan',
    3: 'Hugo',
    4: 'Elise',
    5: 'Emma',
    6: 'Côme',
    7: 'Loup-Enzo',
    8: 'Loïc'
}

var charsPool2 = {
    9: 'Inès',
    10: 'Brice',
    11: 'Alexandre'
}

var charsPointsMapping = {
    'Valentin': { 'fierté': { order: 1, weight: 4 }, 'sadisme': { order: 2, weight: 2 }, 'freakiness': { order: 3, weight: 1 } },
    'Alan': { 'fierté': { order: 2, weight: 3 }, 'sadisme': { order: 3, weight: 1 }, 'freakiness': { order: 1, weight: 3 } },
    'Hugo': { 'fierté': { order: 2, weight: 3 }, 'sadisme': { order: 3, weight: 2 }, 'freakiness': { order: 1, weight: 4 } },
    'Elise': { 'fierté': { order: 3, weight: 1 }, 'sadisme': { order: 1, weight: 5 }, 'freakiness': { order: 2, weight: 4 } },
    'Emma': { 'fierté': { order: 3, weight: 2 }, 'sadisme': { order: 1, weight: 4 }, 'freakiness': { order: 2, weight: 3 } },
    'Côme': { 'fierté': { order: 1, weight: 5 }, 'sadisme': { order: 3, weight: 1 }, 'freakiness': { order: 2, weight: 3 } },
    'Loup-Enzo': { 'fierté': { order: 3, weight: 1 }, 'sadisme': { order: 1, weight: 4 }, 'freakiness': { order: 2, weight: 3 } },
    'Inès': { 'fierté': { order: 2, weight: 3 }, 'sadisme': { order: 3, weight: 1 }, 'freakiness': { order: 1, weight: 5 } },
    'Brice': { 'fierté': { order: 3, weight: 1 }, 'sadisme': { order: 2, weight: 3 }, 'freakiness': { order: 1, weight: 4 } },
    'Alexandre': { 'fierté': { order: 1, weight: 4 }, 'sadisme': { order: 3, weight: 1 }, 'freakiness': { order: 2, weight: 3 } },
    'Loïc': { 'fierté': { order: 1, weight: 3 }, 'sadisme': { order: 2, weight: 4 }, 'freakiness': { order: 3, weight: 1 } }
}

var questions = {
    1: { text: "Mon partenaire est la personne la plus importante au monde.", isNegative: false },
    2: { text: "Mon partenaire peut me traiter comme il/elle le souhaite.", isNegative: false },
    3: { text: "Dans notre maison, il y aura une cave du sexe BDSM", isNegative: false },
    4: { text: "Mon partenaire est plus important que moi", isNegative: false },
    5: { text: "Le #salon-mature est un bon endroit pour un rencard.", isNegative: false },
    6: { text: "Mon partenaire mérite sa place dans la #galerie-d-art", isNegative: false },
    7: { text: "Dans une relation, la priorité, c'est le plaisir.", isNegative: false },
    8: { text: "Mon partenaire et moi sommes prêts à faire voeu de chasteté", isNegative: true },
    9: { text: "Moi et mon partenaire devons avoir une relation saine et honnête", isNegative: true },
    10: { text: "Je suis plutôt d'accord avec l'affirmation 'To be cringe is to be free'", isNegative: true },
    11: { text: "Mon partenaire devrait occuper ou viser des positions professionneles prestigieuses.", isNegative: false},
    12: { text: "Je suis plutôt d'accord avec l'affirmation 'Mieux vaut être seul que mal accompagné'.", isNegative: true},
    13: { text: "Ça ne me dérange pas si mon partenaire passe beaucoup de temps dans le #salon-mature.", isNegative: false},
    14: { text: "Mon partenaire peut dicter comment je dois vivre ma vie.", isNegative: false},
    15: { text: "Mon partenaire devrait avoir les droits admin.", isNegative: false},
    16: { text: "Mon partenaire peut garder autant de secrets qu'il/elle le souhaite.", isNegative: false},
    17: { text: "Quand je vois comment Emma, Elise et Inès traitent Alan, je suis envieux.", isNegative: false},
    18: { text: "Le mot 'radiateur' évoque de bons souvenirs.", isNegative: false},
    19: { text: "Je suis plutôt d'accord avec l'affirmation : C'est pas parce qu'il y a un gardien qu'on ne peut pas tirer.", isNegative: false },
    20: { text: "Mon partenaire aime les pieds", isNegative: false },

};

var mappingQuestionsAndPoints = {
    1: ['fierté'],
    2: ['sadisme'],
    3: ['sadisme','freakiness'],
    4: ['fierté'],
    5: ['freakiness'],
    6: ['fierté'],
    7: ['freakiness'],
    8: ['freakiness'],
    9: ['sadisme'],
    10: ['fierté'],
    11: ['fierté'],
    12: ['sadisme','freakiness'],
    13: ['freakiness'],
    14: ['sadisme'],
    15: ['fierté'],
    16: ['fierté'],
    17: ['sadisme'],    
    18: ['sadisme'],    
    19: [],
    20: []
}

var charsImages = {
    'Valentin': 'images/valentin.png',
    'Alan': 'images/alan.png',
    'Hugo': 'images/hugo.png',
    'Elise': 'images/elise.png',
    'Emma': 'images/emma.png',
    'Côme': 'images/come.png',
    'Loup-Enzo': 'images/loup-enzo.png',
    'Inès': 'images/ines.png',
    'Brice': 'images/brice.png',
    'Alexandre': 'images/alexandre.png',
    'Loïc': 'images/loic.png'
};

var charsText = {
    'Valentin': '"Tu disais "BIENVENUE DANS MON REPAIRE !"... Il est temps pour moi de te dire "BIENVENUE DANS MON COEUR"!"',
    'Alan': '"Let\'s love each other at FULL POWER!"',
    'Hugo': '"Comme tes projets, notre relation n\'aura pas de fin 💞"',
    'Elise': '"Je sens de la \*chemistry\* entre nous..."',
    'Emma': '"Je ne mesure peut-être que 8 fois ta taille, mais promis je serais à la hauteur."',
    'Côme': '"Je sais que je ne pourrais jamais te surpasser, mais peut-être peux-tu me laisser la chance d\'essayer de t\'égaler ? >///<"',
    'Loup-Enzo': '"Ensemble nous serons les plus rhum-antiques"',
    'Inès': '"Comme une verrue qui s\'attache à un pied, je ne t\'abandonnerai jamais ❤️"',
    'Brice': '"Soyons Bourret ensemble 💖"',
    'Alexandre': '"Tu es le feur de mon quoi"',
    'Loïc': '"Tu es l\'admin de mon coeur <3"'
};

let currentQuestion = 1;
let selectedValue = null;
const answers = { 'fierté': [], 'sadisme': [], 'freakiness': [] };
let specialAnswers = { q19: null, q20: null };

function select(el, value) {
    document.querySelectorAll('.circle').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedValue = value;
}

function validate() {
    if (selectedValue === null) { alert("Réponds à la question, petit chenapan !"); return; }

    const valueToStore = questions[currentQuestion].isNegative ? 6 - selectedValue : selectedValue;

    if (currentQuestion === 19) specialAnswers.q19 = valueToStore;
    if (currentQuestion === 20) specialAnswers.q20 = valueToStore;

    const themes = mappingQuestionsAndPoints[currentQuestion];
    themes.forEach(theme => { if (answers[theme]) answers[theme].push(valueToStore); });

    selectedValue = null;
    currentQuestion++;
    if (currentQuestion > Object.keys(questions).length) showResults();
    else loadQuestion();
}

function loadQuestion() {
    document.querySelector(".question-number").innerText = "Question n°" + currentQuestion;
    document.querySelector(".question-text").innerText = questions[currentQuestion].text;
    document.querySelectorAll('.circle').forEach(c => c.classList.remove('selected'));
}

function average(arr) { if (arr.length === 0) return 0; return arr.reduce((a,b) => a+b,0)/arr.length; }
function customRound(value) { return (value - Math.floor(value) >= 0.5) ? Math.ceil(value) : Math.floor(value); }

function showResults() {

    // Q6 override → Inès seulement si réponse = 5
    if (specialAnswers.q20 === 5) {
        document.querySelector(".container").innerHTML = `
            <div class="question-card">
                <h2>💖 Ton match est 💖</h2>
                <img src="${charsImages['Inès']}" alt="Inès" class="result-image">
                <h1>Inès</h1>
                <p>Envie d'envoyer un petit message à ton nouveau partenaire...? Voici une suggestion :<br/><br/>${charsText['Inès']}</p>
            </div>
        `;

        // Jouer la musique pour Inès
        const audio = new Audio('Ines.mp3');
        audio.volume = 0.25;
        audio.play();
        return;
    }

    const scores = {
        'fierté': customRound(average(answers['fierté'])),
        'sadisme': customRound(average(answers['sadisme'])),
        'freakiness': customRound(average(answers['freakiness']))
    };

    const sortedThemes = Object.entries(scores).sort((a,b) => b[1]-a[1]);
    let charScores = {};
    Object.keys(charsPointsMapping).forEach(name => charScores[name] = 0);

    sortedThemes.forEach(([theme, userValue], index) => {
        Object.entries(charsPointsMapping).forEach(([name, data]) => {
            if (!data[theme]) return;

            // Pool 2 lock → Q5 < 3 ignore
            if (Object.values(charsPool2).includes(name) && (specialAnswers.q19 < 3)) return;

            const char = data[theme];
            if (char.order === index + 1) charScores[name] += 1;
            if (char.weight === userValue) charScores[name] += 3;
            else if (Math.abs(char.weight - userValue) === 1) charScores[name] += 1;
            else charScores[name] -= 1;
            charScores[name] += Math.random() * 0.2;
        });
    });

    const sortedChars = Object.entries(charScores).sort((a,b) => b[1]-a[1]);
    const winner = sortedChars[0][0];

    document.querySelector(".container").innerHTML = `
        <div class="question-card">
            <h2>💖 Ton match est 💖</h2>
            <img src="${charsImages[winner]}" alt="${winner}" class="result-image">
            <h1>${winner}</h1>
            <p>Envie d'envoyer un petit message à ton nouveau partenaire...? Voici une suggestion :<br/><br/>${charsText[winner]}</p>
        </div>
    `;

    // Jouer la musique correspondant au gagnant
    const audio = new Audio(`${winner}.mp3`);
    audio.volume = 0.25;
    audio.play();
}
</script>

</body>
</html>
